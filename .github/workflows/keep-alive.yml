name: Keep Render App Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # Executa a cada 10 minutos
  workflow_dispatch:  # Permite execução manual para teste

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Render application
        run: |
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://github-readme-streak-stats-eop6.onrender.com)
          if [ $STATUS_CODE -eq 200 ]; then
            echo "✅ App está respondendo (Status: $STATUS_CODE)"
          else
            echo "⚠️ App retornou status: $STATUS_CODE (ainda acordando...)"
          fi
